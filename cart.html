<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - TiendaGlobal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-bar-container">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-6">
                    <a href="index.html" class="text-white text-decoration-none fs-3 fw-bold">
                        Tienda<span style="color: var(--accent-gold);">Global</span>
                    </a>
                </div>
                <div class="col-6 text-end">
                    <a href="login.html" class="text-white text-decoration-none me-3 d-none d-md-inline">Ingresar</a>
                    <a href="cart.html" class="text-white text-decoration-none fs-4 position-relative">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">0</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <main class="container my-5">
        <h4 class="mb-4" style="color: var(--dark-text);">Mi carrito</h4>
        
        <div class="cart-empty d-flex flex-column align-items-center justify-content-center">
            <i class="fas fa-cart-arrow-down mb-3" style="font-size: 5rem; color: #e9ecef;"></i>
            <h3 class="mb-2 fw-normal">Hay un carrito que llenar</h3>
            <p class="text-muted mb-4">¡No tienes productos en tu carrito!</p>
            <a href="index.html#productos" class="btn btn-action py-2 px-4">Buscar productos</a>
        </div>

        <h5 class="mt-5 mb-4 border-bottom pb-2 text-secondary fw-normal">Productos relacionados <a href="index.html#productos" class="text-decoration-none fs-6 ms-2" style="color: #0d6efd;">Ver más</a></h5>
        
        <div class="row row-cols-2 row-cols-md-4 g-3">
            <div class="col">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db?w=300&q=80" class="card-img-top p-3" alt="PS5">
                    <div class="card-body text-center p-2">
                        <h6 class="card-title text-truncate" style="font-size: 0.9rem;">Consola PlayStation 5</h6>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=300&q=80" class="card-img-top p-3" alt="Apple Watch">
                    <div class="card-body text-center p-2">
                        <h6 class="card-title text-truncate" style="font-size: 0.9rem;">Smartwatch Series 8</h6>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto">
        <div class="container text-center text-white-50">
            &copy; 2026 TiendaGlobal. Todos los derechos reservados.
        </div>
    </footer>

</body>
</html>
