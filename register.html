<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TiendaGlobal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark p-3 text-center d-flex justify-content-center">
        <a href="index.html" class="navbar-brand fs-3 fw-bold m-0">
            Tienda<span style="color: var(--accent-gold);">Global</span>
        </a>
    </nav>

    <div class="container pb-5">
        <div class="auth-container mt-4">
            <h3 class="auth-title">Regístrate</h3>
            
            <button class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
                Ingresar con Google
            </button>
            
            <div class="separator">o regístrate con tu email</div>
            
            <form action="index.html">
                <div class="mb-3">
                    <label class="form-label text-muted">Nombre/s <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Apellido/s <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Contraseña <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" required>
                    <div class="form-text p-1 bg-light mt-1">Nivel seguridad de contraseña: Sin contraseña</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Confirmar contraseña <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" required>
                </div>
                
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="ofertas">
                    <label class="form-check-label text-muted" for="ofertas" style="font-size: 0.9rem;">
                        Recibir ofertas de TiendaGlobal
                    </label>
                </div>

                <div class="d-flex justify-content-center mb-4">
                    <div class="border p-2 rounded d-flex align-items-center justify-content-between" style="width: 100%; max-width: 300px; background: #f9f9f9;">
                        <div class="form-check m-0">
                            <input class="form-check-input" type="checkbox" id="robotCheckReg" required>
                            <label class="form-check-label" for="robotCheckReg">No soy un robot</label>
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" alt="reCAPTCHA" width="30">
                    </div>
                </div>

                <button type="submit" class="btn btn-action w-100 py-2 fs-5">Regístrate</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted mb-2">¿Ya tienes una cuenta?</p>
                <a href="login.html" class="btn btn-outline-action w-100 py-2">Ingresar</a>
            </div>
            
            <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">
                Al registrarte estás aceptando nuestros <a href="#" style="color: #0d6efd; text-decoration: none;">Términos y Condiciones</a>
            </p>
        </div>
    </div>

</body>
</html>
