<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | CineVista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <nav class="navbar navbar-dark p-3 justify-content-center">
        <a href="index.html" class="navbar-brand fs-3 fw-bold m-0">Cine<span>Vista</span></a>
    </nav>

    <div class="container py-5">
        <div class="auth-container">
            <h3 class="auth-title">¡Hola de nuevo!</h3>
            <p class="text-center text-muted mb-4">Ingresá para reservar tus próximas funciones.</p>

            <button class="google-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="#4285F4" d="M21.6 12.23c0-.78-.07-1.53-.2-2.25H12v4.26h5.38a4.6 4.6 0 0 1-2 3.02v2.5h3.24c1.9-1.75 2.98-4.33 2.98-7.53Z"></path>
                    <path fill="#34A853" d="M12 22c2.7 0 4.96-.9 6.62-2.43l-3.24-2.5c-.9.6-2.05.96-3.38.96-2.6 0-4.8-1.76-5.59-4.12H3.07v2.58A10 10 0 0 0 12 22Z"></path>
                    <path fill="#FBBC05" d="M6.41 13.91A6.02 6.02 0 0 1 6.41 10.1V7.52H3.07a10 10 0 0 0 0 12.78l3.34-2.59Z"></path>
                    <path fill="#EA4335" d="M12 6.04c1.47 0 2.79.5 3.83 1.49l2.87-2.87A9.95 9.95 0 0 0 12 2a10 10 0 0 0-8.93 5.52l3.34 2.59C7.2 7.8 9.4 6.04 12 6.04Z"></path>
                </svg>
                <span>Continuar con Google</span>
            </button>

            <div class="separator"><span>o ingresá con tu email</span></div>

            <form action="index.html">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                    <label for="loginEmail">Correo electrónico</label>
                </div>

                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña" required>
                    <label for="loginPassword">Contraseña</label>
                    <button class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-2" type="button" aria-label="Mostrar contraseña">
                        <i class="far fa-eye"></i>
                    </button>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="text-decoration-none fw-semibold small">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-cinema w-100 py-3">INGRESAR A MI CUENTA</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted mb-2">¿Sos nuevo en CineVista?</p>
                <a href="register.html" class="btn btn-outline-light w-100 py-2 fw-semibold">CREAR UNA CUENTA</a>
            </div>
        </div>
    </div>
</body>
</html>
