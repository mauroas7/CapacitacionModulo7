<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - TiendaGlobal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark p-3 text-center d-flex justify-content-center border-bottom border-warning border-3">
        <a href="index.html" class="navbar-brand fs-3 fw-bold m-0">
            Tienda<span style="color: var(--accent-gold);">Global</span>
        </a>
    </nav>

    <div class="container">
        <div class="auth-container">
            <h3 class="auth-title">¡Hola de nuevo!</h3>
            
            <button class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="22">
                Continuar con Google
            </button>
            
            <div class="separator"><span class="px-2 bg-white small">o ingresa con tu email</span></div>
            
            <form action="index.html">
                
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                    <label for="loginEmail">Correo electrónico</label>
                </div>
                
                <div class="form-floating mb-3 position-relative">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Contraseña" required>
                    <label for="loginPassword">Contraseña</label>
                    <button class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-2" type="button" style="color: #888;">
                        <i class="far fa-eye"></i>
                    </button>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="text-decoration-none fw-semibold small" style="color: var(--primary-blue);">¿Olvidaste tu contraseña?</a>
                </div>
                
                <div class="d-flex justify-content-center mb-4">
                    <div class="border p-2 rounded-3 d-flex align-items-center justify-content-between shadow-sm" style="width: 100%; max-width: 320px; background: #fafafa;">
                        <div class="form-check m-0 ms-2">
                            <input class="form-check-input" type="checkbox" id="robotCheck" required>
                            <label class="form-check-label fw-medium ms-1" for="robotCheck" style="font-size: 0.9rem;">No soy un robot</label>
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" alt="reCAPTCHA" width="30" class="me-1">
                    </div>
                </div>

                <button type="submit" class="btn btn-action w-100 py-3 fs-6 letter-spacing-1">INGRESAR A MI CUENTA</button>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted mb-2 text-sm">¿Eres nuevo en TiendaGlobal?</p>
                <a href="register.html" class="btn btn-outline-dark w-100 py-2 fw-semibold">CREAR UNA CUENTA</a>
            </div>
        </div>
    </div>

</body>
</html>
