<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu carrito | CineVista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">
    <header class="page-header">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand fw-bold fs-3" href="index.html">Cine<span>Vista</span></a>
                <div class="d-flex align-items-center gap-3">
                    <a class="nav-link text-white" href="login.html">Ingresar</a>
                    <a class="nav-link position-relative" href="cart.html" aria-label="Carrito de compras">
                        <i class="fas fa-ticket-alt"></i>
                        <span class="cart-badge badge rounded-pill bg-danger" data-cart-count>0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="cart-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <p class="section-kicker mb-1">Tu carrito</p>
                            <h1 class="h3 mb-0">Entradas y experiencias seleccionadas.</h1>
                        </div>
                        <a href="index.html#cartelera" class="btn btn-outline-light btn-sm">Seguir viendo</a>
                    </div>
                    <div id="cartItems"></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="summary-card">
                    <h2 class="h4 mb-4">Resumen de compra</h2>
                    <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
                    <div class="summary-row"><span>Cargos de servicio</span><span id="service">$0</span></div>
                    <div class="summary-row total"><span>Total</span><span id="total">$0</span></div>
                    <button class="btn btn-cinema w-100 mt-3" type="button">Finalizar compra</button>
                    <p class="small text-muted mt-3 mb-0">Esta demo simula un carrito visual completo usando almacenamiento local en el navegador.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer footer-small">
        <div class="container text-center text-white-50">
            © 2026 CineVista. Todos los derechos reservados.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
